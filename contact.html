<form
  action="https://script.google.com/macros/s/AKfycbzZ54vE3_36nMCSB5FTYEzD7bu6DCFLfvK8iluCU63si2INbfByZc87FblvFbuRVT-I/exec"
  method="POST">

  <input type="text" name="name" required>
  <input type="email" name="email" required>
  <input type="text" name="phone">
  <textarea name="message"></textarea>

  <button type="submit">Send Inquiry</button>
</form>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = this;

    fetch("https://script.google.com/macros/s/AKfycbzZ54vE3_36nMCSB5FTYEzD7bu6DCFLfvK8iluCU63si2INbfByZc87FblvFbuRVT-I/exec", {
        method: "POST",
        body: new FormData(form),
        mode: "no-cors"
    })
    .then(() => {
        alert("Inquiry submitted successfully!");
        form.reset();
    })
    .catch(error => {
        console.error(error);
        alert("Submission failed");
    });
});
</script>
