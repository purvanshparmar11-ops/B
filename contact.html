<form id="contactForm">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="phone" placeholder="Phone">
    <textarea name="message" placeholder="Your Inquiry"></textarea>
    <button type="submit">Submit</button>
</form>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyzaV8j-vOEiCrqoTDQbYx9nOYYxvsB70f47o-h1YPWNfycn8jLeusBWq7Re0C60TZu/exec";
const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    fetch(scriptURL, {
        method: "POST",
        body: new FormData(form)
    })
    .then(response => {
        alert("Your inquiry has been submitted successfully.");
        window.location.href = "contact.html"; // Redirect to Contact page
    })
    .catch(error => {
        alert("Something went wrong. Please try again.");
        console.error(error);
    });
});
</script>
