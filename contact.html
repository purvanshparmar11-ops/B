<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
</head>
<body>

<form id="contactForm">
  <input type="text" id="name" placeholder="Name" required><br><br>

  <input type="email" id="email" placeholder="Email" required><br><br>

  <textarea id="message" placeholder="Message" required></textarea><br><br>

  <button type="submit">Send</button>
</form>

<p id="result"></p>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("https://script.google.com/macros/s/AKfycbz3i0hOeOMzli4RVmNMnBn2Kd3CVnnAmhZQDlF7fJKJrzobrEdBEGasl_gU7I0MZqhd/exec", {
        method: "POST",
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            message: document.getElementById("message").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML = "Submitted successfully!";
        document.getElementById("contactForm").reset();
    })
    .catch(err => {
        document.getElementById("result").innerHTML = "Error submitting form.";
        console.error(err);
    });
});
</script>

</body>
</html>
